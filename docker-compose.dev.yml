services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./frontend/dist:/app/frontend/dist
      - firev_data:/app/data
      - firev_logs:/app/logs
    env_file:
      - .env.docker
    environment:
      - FIREV_DATA_DIR=/app/data
      - FIREV_LOGS_DIR=/app/logs
    command: ["python", "-m", "uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--loop", "uvloop"]

volumes:
  firev_data:
  firev_logs:
