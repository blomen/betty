[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "oddopp"
version = "0.1.0"
description = "Odds Opportunities - Compare betting odds against sharp bookmakers"
requires-python = ">=3.10"
dependencies = [
    # HTTP/API
    "aiohttp>=3.9.0",
    "requests>=2.31.0",
    "httpx>=0.27.0",

    # Database
    "sqlalchemy>=2.0.0",
    "aiosqlite>=0.19.0",

    # Data
    "pydantic>=2.5.0",

    # CLI
    "typer>=0.9.0",
    "rich>=13.7.0",

    # API
    "fastapi>=0.109.0",
    "uvicorn>=0.27.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
]
scrape = [
    # Only needed if scraping (Pinnacle fallback)
    "playwright>=1.40.0",
]

[project.scripts]
oddopp = "src.cli:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
