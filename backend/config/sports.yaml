# Sports configuration for Firev
# Each sport maps to provider-specific IDs
#
# Structure:
#   key: The canonical sport identifier used throughout the codebase
#   name: Display name
#   aliases: Alternative names for matching (lowercase)
#   pinnacle_id: Pinnacle API sport ID
#   kambi_sport: Kambi API sport identifier

