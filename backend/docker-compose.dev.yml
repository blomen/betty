name: betty

services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app/backend
      - betty_data:/app/data
      - betty_logs:/app/logs
    env_file:
      - ../.env.docker
    environment:
      - BETTY_DATA_DIR=/app/data
      - BETTY_LOGS_DIR=/app/logs
    command: ["python", "-m", "uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--loop", "uvloop"]

volumes:
  betty_data:
  betty_logs:
