services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app/backend
      - arnold_data:/app/data
      - arnold_logs:/app/logs
    env_file:
      - ../.env.docker
    environment:
      - ARNOLD_DATA_DIR=/app/data
      - ARNOLD_LOGS_DIR=/app/logs
    command: ["python", "-m", "uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--loop", "uvloop"]

volumes:
  arnold_data:
  arnold_logs:
