<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>arnoldstocks - NQ Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body { background: #0a0a0f; color: #e0e0e0; font-family: 'Consolas', 'Monaco', monospace; font-size: 13px; display: flex; flex-direction: column; }

/* Header */
.header {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 8px 16px;
    background: #111118;
    border-bottom: 1px solid #1e1e2e;
    flex-shrink: 0;
    min-height: 56px;
}
.header .price {
    font-size: 28px;
    font-weight: bold;
    color: #00ff88;
    letter-spacing: 1px;
    transition: color 0.2s;
    min-width: 110px;
}
.header .price.down { color: #ff4444; }
.header .spread { color: #666; font-size: 11px; margin-top: 2px; }
.header .conn-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 11px;
    color: #666;
}
.conn-row { display: flex; align-items: center; gap: 6px; }
.status-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    flex-shrink: 0;
}
.status-dot.on  { background: #00ff88; box-shadow: 0 0 4px #00ff8888; }
.status-dot.off { background: #ff4444; }
.header .account { margin-left: auto; text-align: right; }
.header .account .balance { font-size: 16px; color: #4fc3f7; font-weight: bold; }
.header .account .pnl { font-size: 13px; margin-top: 2px; color: #888; }
.header .account .pnl.positive { color: #00ff88; }
.header .account .pnl.negative { color: #ff4444; }
.header .title-label {
    font-size: 11px;
    color: #333;
    letter-spacing: 2px;
    text-transform: uppercase;
    align-self: flex-end;
    padding-bottom: 2px;
}

/* Main layout */
.main {
    display: flex;
    flex: 1;
    min-height: 0;
}
.chart-section {
    flex: 7;
    padding: 8px;
    display: flex;
    flex-direction: column;
    min-width: 0;
}
.chart-wrapper {
    flex: 1;
    position: relative;
    min-height: 0;
}
canvas#chart {
    display: block;
    background: #0d0d14;
    border: 1px solid #1a1a2e;
    border-radius: 4px;
}
.signals-section {
    flex: 3;
    border-left: 1px solid #1e1e2e;
    display: flex;
    flex-direction: column;
    min-width: 220px;
    max-width: 340px;
    overflow: hidden;
}
.signals-header {
    padding: 8px 10px 6px;
    border-bottom: 1px solid #1e1e2e;
    color: #4fc3f7;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.signals-header .sig-count { color: #555; font-size: 11px; }
#signals-list {
    overflow-y: auto;
    flex: 1;
    padding: 6px 8px;
}
#signals-list::-webkit-scrollbar { width: 4px; }
#signals-list::-webkit-scrollbar-track { background: transparent; }
#signals-list::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

.signal-item {
    padding: 6px 8px;
    margin-bottom: 5px;
    border-radius: 3px;
    background: #111118;
    border-left: 3px solid;
    animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.signal-item.cont { border-color: #00ff88; }
.signal-item.rev  { border-color: #ff4444; }
.signal-item .sig-action { font-weight: bold; font-size: 12px; display: flex; justify-content: space-between; }
.signal-item .sig-action .action-label.cont { color: #00ff88; }
.signal-item .sig-action .action-label.rev  { color: #ff4444; }
.signal-item .sig-action .sig-time { color: #555; font-size: 10px; font-weight: normal; }
.signal-item .sig-details { color: #777; font-size: 11px; margin-top: 3px; line-height: 1.5; }
.signal-item .sig-conf { color: #ffaa00; }
.signal-item .sig-price { color: #ccc; }

/* Footer */
.footer {
    display: flex;
    gap: 20px;
    padding: 5px 16px;
    background: #111118;
    border-top: 1px solid #1e1e2e;
    font-size: 11px;
    color: #555;
    flex-shrink: 0;
    flex-wrap: wrap;
}
.footer .stat-item { white-space: nowrap; }
.footer .stat-value { color: #4fc3f7; }
.footer .stat-value.warn { color: #ffaa00; }
</style>
</head>
<body>

<div class="header">
    <div>
        <div class="price" id="price">---.--</div>
        <div class="spread" id="spread">bid -- | ask --</div>
    </div>
    <div class="conn-group">
        <div class="conn-row">
            <span class="status-dot off" id="relay-dot"></span>
            <span>Relay</span>
        </div>
        <div class="conn-row">
            <span class="status-dot off" id="stream-dot"></span>
            <span>Stream</span>
        </div>
    </div>
    <div class="account">
        <div class="balance" id="balance">$---,---</div>
        <div class="pnl" id="pnl">P&amp;L: ---</div>
    </div>
    <div class="title-label">arnoldstocks / NQ</div>
</div>

<div class="main">
    <div class="chart-section">
        <div class="chart-wrapper" id="chart-wrapper">
            <canvas id="chart"></canvas>
        </div>
    </div>
    <div class="signals-section">
        <div class="signals-header">
            <span>Signals</span>
            <span class="sig-count" id="signals-header-count">0</span>
        </div>
        <div id="signals-list"></div>
    </div>
</div>

<div class="footer">
    <div class="stat-item">Ticks: <span class="stat-value" id="tick-count">0</span></div>
    <div class="stat-item">Ticks/s: <span class="stat-value" id="ticks-per-sec">0</span></div>
    <div class="stat-item">Signals: <span class="stat-value" id="signal-count">0</span></div>
    <div class="stat-item">Zones: <span class="stat-value" id="zone-count">0</span></div>
    <div class="stat-item">Positions: <span class="stat-value" id="position-count">0</span></div>
    <div class="stat-item">Uptime: <span class="stat-value" id="uptime">0m</span></div>
    <div class="stat-item" style="margin-left:auto; color:#333;" id="last-update">--</div>
</div>

<script>
'use strict';

const WS_URL  = `ws://${location.host}/ws/dashboard`;
const API_URL = `/api/state`;

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let ticks      = [];   // { p, t } — price, timestamp
let zones      = [];   // { center, members }
let signals    = [];   // raw signal objects
let positions  = [];

let lastPrice  = 0;
let prevPrice  = 0;
let lastBid    = 0;
let lastAsk    = 0;
let tickCount  = 0;
let signalCount = 0;
let startTime  = Date.now();

// ticks-per-second tracking
let ticksThisSec   = 0;
let ticksPerSecDisp = 0;
let lastSecTime    = Date.now();

// ---------------------------------------------------------------------------
// Canvas / Chart
// ---------------------------------------------------------------------------
const canvas  = document.getElementById('chart');
const ctx     = canvas.getContext('2d');
const wrapper = document.getElementById('chart-wrapper');

function resizeCanvas() {
    canvas.width  = wrapper.clientWidth;
    canvas.height = wrapper.clientHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function yScale(p, minP, range, H) {
    return H - 30 - ((p - minP) / range) * (H - 50) + 10;
}

function drawChart() {
    const W = canvas.width;
    const H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    // Background grid
    ctx.strokeStyle = '#141420';
    ctx.lineWidth = 1;
    for (let y = 0; y < H; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    for (let x = 0; x < W; x += 80) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }

    if (ticks.length < 2) return;

    const disp  = ticks.slice(-400);   // show last 400 ticks for clarity
    const prices = disp.map(t => t.p);
    const minP   = Math.min(...prices) - 1;
    const maxP   = Math.max(...prices) + 1;
    const range  = maxP - minP || 1;

    const xStep  = W / (disp.length - 1 || 1);

    // --- Zones ---
    ctx.save();
    ctx.setLineDash([4, 6]);
    ctx.lineWidth = 1;
    for (const z of zones) {
        const yp = yScale(z.center, minP, range, H);
        if (yp < 0 || yp > H) continue;
        const m = z.members || 1;
        const col = m >= 3 ? '#00ff8833' : m >= 2 ? '#ffaa0033' : '#ff444422';
        ctx.strokeStyle = col;
        ctx.beginPath(); ctx.moveTo(0, yp); ctx.lineTo(W - 110, yp); ctx.stroke();

        // Zone label
        const lblCol = m >= 3 ? '#00ff8877' : m >= 2 ? '#ffaa0077' : '#ff444455';
        ctx.fillStyle = lblCol;
        ctx.font = '10px Consolas, monospace';
        ctx.fillText(`${z.center.toFixed(2)} (${m}m)`, W - 106, yp + 3);
    }
    ctx.restore();

    // --- Price area fill ---
    ctx.beginPath();
    for (let i = 0; i < disp.length; i++) {
        const x = i * xStep;
        const y = yScale(disp[i].p, minP, range, H);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#4fc3f722');
    grad.addColorStop(1, '#4fc3f700');
    ctx.lineTo((disp.length - 1) * xStep, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // --- Price line ---
    ctx.beginPath();
    ctx.strokeStyle = '#4fc3f7';
    ctx.lineWidth = 1.5;
    ctx.lineJoin = 'round';
    for (let i = 0; i < disp.length; i++) {
        const x = i * xStep;
        const y = yScale(disp[i].p, minP, range, H);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // --- Signal markers ---
    const dispStart = ticks.length > 400 ? ticks.length - 400 : 0;
    for (const sig of signals) {
        const sigTs = sig.ts || 0;
        // Find matching index in displayed slice
        let idx = disp.findIndex(t => t.t >= sigTs);
        if (idx < 0) {
            if (sigTs > (disp[disp.length - 1]?.t || 0)) idx = disp.length - 1;
            else continue;
        }
        const x = idx * xStep;
        const sigPrice = sig.price || sig.signal_price || lastPrice;
        const y = yScale(sigPrice, minP, range, H);
        const isCont = isContinuation(sig);

        ctx.beginPath();
        if (isCont) {
            // Up triangle
            ctx.fillStyle = '#00ff88cc';
            ctx.moveTo(x,     y + 6);
            ctx.lineTo(x - 5, y + 14);
            ctx.lineTo(x + 5, y + 14);
        } else {
            // Down triangle
            ctx.fillStyle = '#ff4444cc';
            ctx.moveTo(x,     y - 6);
            ctx.lineTo(x - 5, y - 14);
            ctx.lineTo(x + 5, y - 14);
        }
        ctx.closePath();
        ctx.fill();
    }

    // --- Current price label (right edge) ---
    if (lastPrice > 0) {
        const curY  = yScale(lastPrice, minP, range, H);
        const rising = lastPrice >= prevPrice;
        const lbg   = rising ? '#00c96688' : '#cc333388';
        const lfg   = rising ? '#00ff88' : '#ff6666';

        // Dashed line to label
        ctx.save();
        ctx.setLineDash([3, 4]);
        ctx.strokeStyle = lfg + '55';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo((disp.length - 1) * xStep, curY);
        ctx.lineTo(W - 85, curY);
        ctx.stroke();
        ctx.restore();

        // Label box
        ctx.fillStyle = lbg;
        ctx.fillRect(W - 84, curY - 9, 84, 18);
        ctx.strokeStyle = lfg + '99';
        ctx.lineWidth = 1;
        ctx.strokeRect(W - 84, curY - 9, 84, 18);
        ctx.fillStyle = lfg;
        ctx.font = 'bold 12px Consolas, monospace';
        ctx.textAlign = 'center';
        ctx.fillText(lastPrice.toFixed(2), W - 42, curY + 4);
        ctx.textAlign = 'left';
    }

    // --- Y-axis price labels ---
    ctx.fillStyle = '#333';
    ctx.font = '10px Consolas, monospace';
    const step = Math.ceil(range / 5);
    for (let p = Math.ceil(minP); p <= maxP; p += step) {
        const yp = yScale(p, minP, range, H);
        if (yp < 10 || yp > H - 10) continue;
        ctx.fillText(p.toFixed(0), 4, yp + 3);
    }
}

// ---------------------------------------------------------------------------
// Signals panel
// ---------------------------------------------------------------------------
function isContinuation(sig) {
    const a = (sig.action || '').toLowerCase();
    return a.includes('cont') || a.includes('long') || a.includes('buy');
}

function addSignalToList(sig) {
    const list    = document.getElementById('signals-list');
    const cont    = isContinuation(sig);
    const cls     = cont ? 'cont' : 'rev';
    const ts      = sig.ts ? new Date(sig.ts * 1000).toLocaleTimeString() : '--';
    const price   = (sig.price || sig.signal_price || 0).toFixed(2);
    const zone    = (sig.zone || sig.zone_center || sig.center_price || 0).toFixed(2);
    const conf    = (sig.confidence || sig.cont_p || sig.rev_p || 0).toFixed(3);
    const approach = sig.approach || sig.direction || '?';

    const el = document.createElement('div');
    el.className = `signal-item ${cls}`;
    el.innerHTML = `
        <div class="sig-action">
            <span class="action-label ${cls}">${sig.action || '?'}</span>
            <span class="sig-time">${ts}</span>
        </div>
        <div class="sig-details">
            <span class="sig-price">@${price}</span>
            &nbsp;|&nbsp;zone <span class="sig-price">${zone}</span>
            &nbsp;|&nbsp;<span class="sig-conf">conf ${conf}</span>
            &nbsp;|&nbsp;${approach}
        </div>`;
    list.insertBefore(el, list.firstChild);

    // Keep list bounded
    while (list.children.length > 60) list.removeChild(list.lastChild);

    document.getElementById('signals-header-count').textContent = list.children.length;
}

// ---------------------------------------------------------------------------
// Header / footer updates
// ---------------------------------------------------------------------------
function updateHeader() {
    const priceEl = document.getElementById('price');
    if (lastPrice > 0) {
        priceEl.textContent = lastPrice.toFixed(2);
        priceEl.className   = `price ${lastPrice < prevPrice ? 'down' : ''}`;
    }
    document.getElementById('spread').textContent =
        `bid ${lastBid > 0 ? lastBid.toFixed(2) : '--'} | ask ${lastAsk > 0 ? lastAsk.toFixed(2) : '--'}`;
}

function updateFooter() {
    document.getElementById('tick-count').textContent   = tickCount.toLocaleString();
    document.getElementById('signal-count').textContent = signalCount;
    document.getElementById('zone-count').textContent   = zones.length;
    document.getElementById('position-count').textContent = positions.length;

    const elapsedMin = Math.floor((Date.now() - startTime) / 60000);
    document.getElementById('uptime').textContent =
        elapsedMin >= 60 ? `${Math.floor(elapsedMin/60)}h${elapsedMin%60}m` : `${elapsedMin}m`;

    const now = Date.now();
    if (now - lastSecTime >= 1000) {
        ticksPerSecDisp = ticksThisSec;
        ticksThisSec    = 0;
        lastSecTime     = now;
    }
    const tpsEl = document.getElementById('ticks-per-sec');
    tpsEl.textContent  = ticksPerSecDisp;
    tpsEl.className    = `stat-value${ticksPerSecDisp === 0 ? ' warn' : ''}`;

    document.getElementById('last-update').textContent =
        new Date().toLocaleTimeString();
}

function updateStatusDots(relayConn, streamRun) {
    document.getElementById('relay-dot').className  = `status-dot ${relayConn ? 'on' : 'off'}`;
    document.getElementById('stream-dot').className = `status-dot ${streamRun ? 'on' : 'off'}`;
}

// ---------------------------------------------------------------------------
// WebSocket
// ---------------------------------------------------------------------------
function connectWS() {
    const ws = new WebSocket(WS_URL);

    ws.onopen = () => {
        console.log('[ws] connected');
    };

    ws.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }

        switch (msg.type) {
            case 'tick':
                prevPrice  = lastPrice || msg.price;
                lastPrice  = msg.price;
                tickCount  = msg.tick_count || tickCount + 1;
                ticks.push({ p: msg.price, t: msg.ts || Date.now() / 1000 });
                if (ticks.length > 2000) ticks.shift();
                ticksThisSec++;
                updateHeader();
                break;

            case 'quote':
                if (msg.bestBid)   lastBid   = msg.bestBid;
                if (msg.bestAsk)   lastAsk   = msg.bestAsk;
                if (msg.lastPrice) { prevPrice = lastPrice; lastPrice = msg.lastPrice; }
                updateHeader();
                break;

            case 'signal':
                signalCount++;
                signals.push(msg);
                if (signals.length > 100) signals.shift();
                addSignalToList(msg);
                break;

            case 'zones':
                zones = (msg.zones || []).map(normalizeZone);
                break;

            case 'positions':
                positions = msg.positions || [];
                break;

            case 'account':
                renderAccount(msg);
                break;

            case 'status':
                updateStatusDots(msg.relay_connected, msg.stream_running);
                break;
        }
    };

    ws.onclose  = () => { setTimeout(connectWS, 2000); };
    ws.onerror  = () => {};
}

function normalizeZone(z) {
    return {
        center:  z.center || z.center_price || z.price || 0,
        members: z.members || z.member_count || z.count || 1,
    };
}

function renderAccount(acc) {
    const balance = acc.balance || acc.account_value || acc.equity;
    const pnl     = acc.daily_pnl || acc.pnl || acc.unrealized_pnl;
    if (balance != null) {
        document.getElementById('balance').textContent =
            '$' + Number(balance).toLocaleString('en-US', { minimumFractionDigits: 0 });
    }
    if (pnl != null) {
        const pnlEl = document.getElementById('pnl');
        const sign  = pnl >= 0 ? '+' : '';
        pnlEl.textContent = `P&L: ${sign}$${Number(pnl).toLocaleString('en-US', { minimumFractionDigits: 0 })}`;
        pnlEl.className   = `pnl ${pnl >= 0 ? 'positive' : 'negative'}`;
    }
}

// ---------------------------------------------------------------------------
// Initial state load
// ---------------------------------------------------------------------------
fetch(API_URL)
    .then(r => r.json())
    .then(data => {
        ticks  = (data.ticks || []).map(t => ({ p: t.p, t: t.t }));
        zones  = (data.zones || []).map(normalizeZone);
        signals = data.signals || [];
        tickCount   = data.stats?.tick_count   || 0;
        signalCount = data.stats?.signal_count || 0;

        lastPrice = ticks.length ? ticks[ticks.length - 1].p : 0;
        prevPrice = lastPrice;

        if (data.quote) {
            lastBid = data.quote.bestBid || 0;
            lastAsk = data.quote.bestAsk || 0;
        }
        if (data.account) renderAccount(data.account);

        updateStatusDots(
            data.stats?.relay_connected  || false,
            data.stats?.stream_running   || false,
        );

        // Populate signals panel (oldest first in state, newest at top)
        for (let i = signals.length - 1; i >= 0; i--) addSignalToList(signals[i]);
        // Re-sort: addSignalToList inserts at top, so we want newest last in the array
        signals = [...signals];

        updateHeader();
        updateFooter();
    })
    .catch(() => {});

// ---------------------------------------------------------------------------
// Start
// ---------------------------------------------------------------------------
connectWS();
setInterval(drawChart,    200);  // 5 FPS
setInterval(updateFooter, 1000); // 1 Hz footer stats
</script>
</body>
</html>
