# Polymarket series-slug → canonical sport mapping.
# Maintained as YAML so adding a new league is a config change, not a code edit.
# The provider also strips a `-YYYY` suffix at lookup time, so most year-suffix
# variants are auto-handled (e.g. nba-2026 → nba). Only add explicit entries
# when the base slug differs across years (mex-2025, ere-2025, etc.).

football:
  - premier-league
  - la-liga
  - la-liga-2
  - bundesliga
  - bundesliga-2
  - serie-a
  - serie-b
  - ligue-1
  - ligue-2
  - eredivisie
  - mls
  - efl-championship
  - efl-cup
  - fa-cup
  - dfb-pokal
  - copa-del-rey
  - coppa-italia
  - coupe-de-france
  - champions-league
  - europa-league
  - conference-league
  - saudi-professional-league
  - primera-divisin-argentina
  - brazil-serie-a
  - mex-2025
  - liga-mx
  - a-league-soccer
  - denmark-superliga
  - scottish-premiership
  - copa-libertadores
  - ere-2025  # Eredivisie 2025

basketball:
