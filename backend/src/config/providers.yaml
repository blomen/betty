# Extraction Tiers
# Defines how frequently different provider types should be extracted
extraction_tiers:
  continuous:
    # Primary betting (Polymarket) + sharp reference (Pinnacle)
    # These run on a loop every 5 minutes
    providers: [polymarket, pinnacle]
    interval_minutes: 5

  scheduled:
    # Easy API soft books - less frequent extraction
    providers: [betinia]
    interval_minutes: 240  # Every 4 hours

  manual:
    # Rate-limited/browser-based providers - on-demand extraction only
    providers:
      # Kambi API (8 providers)
      - unibet
      - leovegas
      - expekt
      - betmgm
      - speedybet
      - x3000
      - goldenbull
      - 1x2
      # Spectate (2)
      - mrgreen
      - 888sport
      # Gecko V2 (3)
      - betsson
      - betsafe
      - nordicbet
      # SBTech (1)
      - bethard
      # Snabbare (1)
      - snabbare
      # ComeOn group (2)
      - comeon
      - hajper

