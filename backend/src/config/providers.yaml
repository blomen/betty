# Provider Configuration
# Uses YAML anchors to reduce duplication
# Bonus info source: https://speltips.se/ (check periodically for updates)

# Global orchestrator configuration
orchestrator:
  # Concurrency limits
  # Type-aware scheduling allows higher total concurrent providers by mixing types
  max_concurrent_providers: 10         # Increased - mixing allows higher total
  max_concurrent_sports_per_provider: 4 # Max sports per provider
  max_browser_instances: 4             # Global browser limit

  # Provider groups for type-aware scheduling
  # Groups providers by shared backend/resource to prevent rate limits and contention
  provider_groups:
    - name: kambi_api
      retriever_types: [kambi]
      max_concurrent: 1                # Reduced to 1 - Kambi rate limits aggressively (429s)
      shared_resource: api
      health_check_delay_ms: 1000      # 1s between Kambi health checks (reduced from 3s)
      post_extraction_delay_ms: 15000  # 15s delay between providers (reduced from 60s)

    - name: gecko_browser
      retriever_types: [gecko_v2]
      max_concurrent: 2                # Browser + shared Betsson infra
      shared_resource: browser

    - name: spectate_browser
      retriever_types: [spectate]
      max_concurrent: 2                # Browser-based
      shared_resource: browser

    - name: comeon_group
      retriever_types: [custom]
      max_concurrent: 2                # Heavy - multi-page internal parallelism
      shared_resource: browser

    - name: rest_api
      retriever_types: [pinnacle, altenar]
      max_concurrent: 5                # Independent APIs - no limits
      shared_resource: none

    - name: sbtech_browser
      retriever_types: [sbtech, snabbare]
      max_concurrent: 2                # Browser-based
      shared_resource: browser

  # Timeouts (seconds)
  provider_timeout: 300                # Per-provider timeout
  sport_timeout: 60                    # Per-sport timeout

  # Performance
  batch_commit_size: 100               # Events per DB commit

  # Enhancement configurations (all optional, defaults shown)
  retry:
    enabled: true
    max_retries: 3
    initial_backoff_seconds: 2.0
    max_backoff_seconds: 60.0
    exponential_base: 2.0
    retry_on_timeout: true

  circuit_breaker:
    enabled: true
    failure_threshold: 5
    recovery_timeout_seconds: 300
    half_open_max_attempts: 3

  cache:
    enabled: true
    ttl_seconds: 300
    max_entries: 1000
    cache_layer: transport
    cache_per_provider: true

  health_check:
    enabled: true
    strategy: on_demand
    timeout_seconds: 60.0              # Increased to 60s for browser-based providers (comeon, hajper, snabbare take 30-50s)
    check_before_extraction: true

  metrics:
    enabled: true
    track_timing: true
    track_success_rate: true
    track_cache_hit_rate: true
    persist_to_db: false
    retention_count: 100

  progress:
    enabled: true
    transport: callback
    websocket_path: /ws/extraction

  graceful_shutdown:
    enabled: true
    shutdown_timeout_seconds: 30
    cancel_pending_tasks: true

  fuzzy_match:
    threshold: 85                    # Minimum match score (0-100)
    prefix_filter_length: 3          # Chars for prefix pre-filtering (0 to disable)

  rate_limit:
    max_retries: 2                   # Max retries on 429 rate limit
    default_wait_seconds: 5          # Default wait if no Retry-After header
    max_wait_seconds: 60             # Cap on exponential backoff
    notify_circuit_breaker_after: 2  # Notify circuit breaker after N consecutive 429s

# Base configurations
kambi_defaults: &kambi_defaults
  retriever_type: kambi
  base_url: https://eu1.offering-api.kambicdn.com/offering/v2018
  params:
    market: SE
    lang: sv_SE
    odds_format: decimal

