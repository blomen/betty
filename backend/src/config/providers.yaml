# Provider Configuration
# Uses YAML anchors to reduce duplication

# Global orchestrator configuration
orchestrator:
  # Concurrency limits
  max_concurrent_providers: 5          # Max providers running simultaneously
  max_concurrent_sports_per_provider: 3 # Max sports per provider

  # Timeouts (seconds)
  provider_timeout: 300                # Per-provider timeout
  sport_timeout: 60                    # Per-sport timeout

  # Performance
  batch_commit_size: 100               # Events per DB commit

  # Enhancement configurations (all optional, defaults shown)
  retry:
    enabled: true
    max_retries: 3
    initial_backoff_seconds: 2.0
    max_backoff_seconds: 60.0
    exponential_base: 2.0
    retry_on_timeout: true

  circuit_breaker:
    enabled: true
    failure_threshold: 5
    recovery_timeout_seconds: 300
    half_open_max_attempts: 3

  cache:
    enabled: true
    ttl_seconds: 300
    max_entries: 1000
    cache_layer: transport
    cache_per_provider: true

  health_check:
    enabled: true
    strategy: on_demand
    timeout_seconds: 10.0
    check_before_extraction: true

  metrics:
    enabled: true
    track_timing: true
    track_success_rate: true
    track_cache_hit_rate: true
    persist_to_db: false
    retention_count: 100

  progress:
    enabled: true
    transport: callback
    websocket_path: /ws/extraction

  graceful_shutdown:
    enabled: true
    shutdown_timeout_seconds: 30
    cancel_pending_tasks: true

# Base configurations
kambi_defaults: &kambi_defaults
  retriever_type: kambi
  base_url: https://eu1.offering-api.kambicdn.com/offering/v2018
  params:
    market: SE
    lang: sv_SE
    odds_format: decimal

spectate_tournaments: &spectate_tournaments
  football:
    - england/english-premier-league
    - england/english-championship
    - spain/la-liga
    - germany/bundesliga
    - italy/serie-a
    - france/ligue-1
    - europe/uefa-champions-league
    - europe/uefa-europa-league
    - sweden/allsvenskan
    - netherlands/eredivisie
    - portugal/primeira-liga
  basketball:
    - usa/nba
    - europe/euroleague
    - usa/ncaa
  tennis:
    - atp/atp
    - wta/wta
    - australia/australian-open
  ice_hockey:
    - usa/nhl
    - sweden/shl
  american_football:
    - usa/nfl
  baseball:
    - usa/mlb
  mma:
    - ufc/ufc
  esports:
    - counter-strike/esl-pro-league
    - league-of-legends/lec

# Provider definitions
providers:
  # Kambi providers (same API, different brands)
  unibet:
    <<: *kambi_defaults
    id: unibet
    name: Unibet
    domain: unibet.se
    brand: ubse

  leovegas:
    <<: *kambi_defaults
    id: leovegas
    name: LeoVegas
    domain: leovegas.com
    brand: leose

  expekt:
    <<: *kambi_defaults
    id: expekt
    name: Expekt
    domain: expekt.se
    brand: expektse

  paf:
    <<: *kambi_defaults
    id: paf
    name: Paf
    domain: paf.se
    brand: pafse

  atg:
    <<: *kambi_defaults
    id: atg
    name: ATG
    domain: atg.se
    brand: atg

  betmgm:
    <<: *kambi_defaults
    id: betmgm
    name: BetMGM
    domain: betmgm.se
    brand: betmgmse

  casumo:
    <<: *kambi_defaults
    id: casumo
    name: Casumo
    domain: casumo.com
    brand: case

  speedybet:
    <<: *kambi_defaults
    id: speedybet
    name: SpeedyBet
    domain: speedybet.com
    brand: speedybetse

  x3000:
    <<: *kambi_defaults
    id: x3000
    name: X3000
    domain: x3000.se
    brand: speedyspelse

  svenskaspel:
    <<: *kambi_defaults
    id: svenskaspel
    name: Svenskaspel
    domain: spela.svenskaspel.se
    brand: svenskaspel

  goldenbull:
    <<: *kambi_defaults
    id: goldenbull
    name: Golden Bull
    domain: goldenbull.se
    brand: goldenbullse

  1x2:
    <<: *kambi_defaults
    id: 1x2
    name: 1X2
    domain: 1x2.se
    brand: 1x2se

  flaxcasino:
    <<: *kambi_defaults
    id: flaxcasino
    name: Flax Casino
    domain: flaxcasino.se
    brand: flaxse

  # Spectate providers
  mrgreen:
    id: mrgreen
    name: Mr Green
    domain: mrgreen.se
    retriever_type: spectate
    api_base: https://spectate-web.mrgreen.se/spectate
    params:
      tournaments:
        <<: *spectate_tournaments

  888sport:
    id: 888sport
    name: 888sport
    domain: 888sport.se
    retriever_type: spectate
    api_base: https://spectate-web.888sport.se/spectate
    params:
      tournaments:
        <<: *spectate_tournaments

  # Snabbare (custom retriever)
  snabbare:
    id: snabbare
    name: Snabbare
    domain: snabbare.com
    retriever_type: snabbare
    api_base: https://www.snabbare.com/sportsbook-api/api
    params:
      tournaments:
        football:
          - sweden/allsvenskan
          - england/premier-league

  # Gecko providers (Betsson Group - Custom API platform)
  # Using gecko_v2: Browser automation with API interception + stealth to bypass bot detection
  betsson:
    id: betsson
    name: Betsson
    domain: betsson.com
    retriever_type: gecko_v2
    site_url: https://www.betsson.com

  betsafe:
    id: betsafe
    name: Betsafe
    domain: betsafe.com
    retriever_type: gecko_v2
    site_url: https://www.betsafe.com

  nordicbet:
    id: nordicbet
    name: NordicBet
    domain: nordicbet.com
    retriever_type: gecko_v2
    site_url: https://www.nordicbet.com

  # Pinnacle (guest API - no auth required)
  pinnacle:
    id: pinnacle
    name: Pinnacle
    domain: pinnacle.com
    retriever_type: pinnacle
    api_base: https://guest.api.arcadia.pinnacle.com/0.1

  # Coolbet (browser automation with API interception)
  coolbet:
    id: coolbet
    name: Coolbet
    domain: coolbet.com
    retriever_type: coolbet
    site_url: https://www.coolbet.com

  # Polymarket (truth source)
  polymarket:
    id: polymarket
    name: Polymarket
    retriever_type: polymarket
    base_url: https://gamma-api.polymarket.com
    params:
      game_bets_tag_id: 100639

  # SBTech providers (browser automation with API interception)
  bethard:
    id: bethard
    name: Bethard
    domain: bethard.com
    retriever_type: sbtech
    site_url: https://www.bethard.com

  fastbet:
    id: fastbet
    name: Fastbet
    domain: fastbet.com
    retriever_type: sbtech
    site_url: https://www.fastbet.com

  comeon:
    id: comeon
    name: ComeOn
    domain: comeon.com
    retriever_type: custom  # Multi-league WebSocket implementation
    site_url: https://www.comeon.com

    # Breadth controls
    max_leagues: 999  # Number of leagues to extract (999 = all available leagues ~157, ~1000 events)
    concurrent_leagues: 5  # Number of parallel league extractions

    # Depth controls (OPTIMIZED)
    extract_full_markets: true  # Enable event detail page extraction
    concurrent_event_details: 8  # OPTIMIZED: Reduced from 15 to 8 for better performance
    detail_extraction_filter: "all"  # Extract all events for maximum coverage

    # Multi-sport support
    sports_to_extract: "all"  # "all" or list of specific sports
    # sports_to_extract:  # Alternative: specify sports
    #   - football
    #   - basketball
    #   - tennis

    supported_sports:  # Multi-sport support via URL slug mapping
      - football
      - basketball
      - tennis
      - ice_hockey
      - american_football
      - baseball
      - cricket
      - rugby
      - esports
      - mma
      - boxing
      - motorsports

  hajper:
    id: hajper
    name: Hajper
    domain: hajper.com
    retriever_type: custom  # Multi-league WebSocket extraction (ComeOn Group)
    site_url: https://www.hajper.com

    # Breadth controls
    max_leagues: 999  # Number of leagues to extract (999 = all available leagues)
    concurrent_leagues: 5  # Number of parallel league extractions

    supported_sports:
      - football
      - basketball
      - tennis
      - ice_hockey
      - american_football
      - baseball
      - mma
      - esports

  # Altenar Platform Providers
  betinia:
    id: betinia
    name: Betinia
    domain: betinia.se
    retriever_type: altenar  # REST API extraction (Altenar platform)

    # Altenar API configuration
    api_base: https://sb2frontend-altenar2.biahosted.com/api
    integration: betiniase2  # Altenar skin ID for Betinia

    supported_sports:
      - football
      - basketball
      - tennis
      - ice_hockey
      - table_tennis
      - handball
      - volleyball
      - esports

# Active providers (subset of above to use)
