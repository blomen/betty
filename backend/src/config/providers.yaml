# ============================================================================
# Odds Boost Configuration
# ============================================================================
# Boost scraping is separate from odds extraction. Each entry defines a
# boost page to scrape and which providers share those boosts.
# type: scraper function to use (gecko_v2 = API interception)
# type: null means not yet implemented / needs investigation

boosts:
  # ═══════════════════════════════════════════════════════
  # IMPLEMENTED — currently scraping
  # ═══════════════════════════════════════════════════════
  betsson_group:
    type: gecko_v2
    url: "https://www.betsson.com/sv/odds/odds-boost"
    primary_provider: betsson
    shared_with: [nordicbet, spelklubben]
    enabled: true

  # ═══════════════════════════════════════════════════════
  # KAMBI PROVIDERS — no original odds via API
  # Kambi SPECIAL_BETS only shows boosted odds (no pre-boost baseline).
  # Price Boost feature disabled for Swedish market.
  # Listed on aggregators as having oddsboost, but not scrapeable.
  # ═══════════════════════════════════════════════════════
  unibet:
    type: kambi
    url: "https://eu1.offering-api.kambicdn.com/offering/v2018/ubse/listView/unibet_featured.json?lang=sv_SE&market=SE&channel_id=1"
    primary_provider: unibet
    shared_with: []
    enabled: true
    note: "Kambi — prop boosts via unibet_featured group. No original odds (only boosted)."

  leovegas:
    type: null
    primary_provider: leovegas
    shared_with: []
    enabled: false
    note: "Kambi — confirmed no featured/boost group in API (34 top-level groups, none boost-related)"

  expekt:
    type: kambi
    url: "https://eu1.offering-api.kambicdn.com/offering/v2018/expektse/listView/expekt_specials.json?lang=sv_SE&market=SE&channel_id=1"
    primary_provider: expekt
    shared_with: []
    enabled: true

  betmgm:
    type: null
    primary_provider: betmgm
    shared_with: []
    enabled: false
    note: "Kambi (betmgmse) — confirmed no featured/boost group in API"

  goldenbull:
    type: null
    primary_provider: goldenbull
    shared_with: []
    enabled: false
    note: "Kambi (pafgoldense) — confirmed no featured/boost group in API (Paf family, 31 groups)"

  # ═══════════════════════════════════════════════════════
  # ALTENAR PROVIDERS — API: GetEvents + GetEventDetails
  # Boosts found via boostInfo in event details. Brands have ~30%
  # overlapping boosts. Altenar API rate-limits at ~640 requests
  # per IP, so we can only scrape ONE integration per cycle.
  # Betinia is primary; others receive shared boosts.
  # TODO: Interleave requests across integrations with global rate limiter
  # Keywords: förhöjda odds, guldboost, dagens spel, ökade odds
  # ═══════════════════════════════════════════════════════
  betinia:
    type: altenar
    integration: betiniase2
    primary_provider: betinia
    shared_with: [campobet, swiper, lodur, dbet, quickcasino]
    enabled: true
    note: "Altenar primary — scrapes for all Altenar skins. ~265 boosts across football/basketball/hockey."

  campobet:
    type: altenar
    integration: campose
    primary_provider: campobet
    shared_with: []
    enabled: false
    note: "Disabled — rate-limited by Altenar API. Boosts shared from betinia."

  swiper:
    type: altenar
    integration: swiperse
    primary_provider: swiper
    shared_with: []
    enabled: false
    note: "Disabled — rate-limited by Altenar API. Boosts shared from betinia."

  lodur:
    type: altenar
    integration: lodurse
    primary_provider: lodur
    shared_with: []
    enabled: false
    note: "Disabled — rate-limited by Altenar API. Boosts shared from betinia."

  dbet:
    type: altenar
    integration: dbet
    primary_provider: dbet
    shared_with: []
    enabled: false
    note: "Disabled — rate-limited by Altenar API. Boosts shared from betinia."

  quickcasino:
    type: altenar
    integration: quickcasinose
    primary_provider: quickcasino
    shared_with: []
    enabled: false
    note: "Disabled — rate-limited by Altenar API. Boosts shared from betinia."

  # ═══════════════════════════════════════════════════════
  # OBG/GECKO V2 BOOST PAGES — same globalbonuses API as Betsson
  # ═══════════════════════════════════════════════════════
  bethard:
    type: gecko_v2
    url: "https://www.bethard.com/sv/sports/oddsboost"
    primary_provider: bethard
    shared_with: []
    enabled: true
    note: "OBG — /sv/sports/oddsboost loads playground iframe with globalbonuses + event-market APIs."

  spelklubben:
    type: gecko_v2
    url: "https://www.spelklubben.se/sv/betting/oddsboost"
    primary_provider: spelklubben
    shared_with: []
    enabled: false
    note: "Disabled — spelklubben.se has no unique boosts. Covered by betsson_group shared_with."

  # ═══════════════════════════════════════════════════════
  # VBET — BetConstruct Swarm WS get_boosted_selections
  # ═══════════════════════════════════════════════════════
  vbet:
    type: betconstruct
    primary_provider: vbet
    shared_with: []
    enabled: true
    note: "Homepage 'Topphändelser' — boosted 1x2 on promoted games. Requires language=swe session. No original_odds (API only returns boosted price)."

  # ═══════════════════════════════════════════════════════
  # INTERWETTEN — visible boosts on frontpage (DOM scrape)
  # ═══════════════════════════════════════════════════════
  interwetten:
    type: interwetten
    url: "https://www.interwetten.se"
    primary_provider: interwetten
    shared_with: []
    enabled: true
    note: "Proprietary SSR — boosts visible on frontpage as ODDS BOOST with original + boosted odds."

  # ═══════════════════════════════════════════════════════
  # COMEON GROUP — RSocket WS, sport/85-odds-boost
  # sport/37 = MMA (NOT boosts). sport/85 = actual Odds Boost section.
  # Boosts are combo/parlay type: "Team A & Team B - båda vinner" @ boosted odds.
  # Market type 1038 = "Specialare", single "Ja" selection per event.
  # No original odds in WS — only boosted trueOdds shown.
  # Lyllo has no boost section in sidebar navigation.
  # ═══════════════════════════════════════════════════════
  comeon:
    type: comeon
    url: "https://www.comeon.com/sv/sportsbook/sport/85-odds-boost"
    primary_provider: comeon
    shared_with: [hajper, snabbare, lyllo]
    enabled: true
    note: "ComeOn RSocket SPA — sport/85 = Odds Boost. Combo boosts via WS. ~3-5 boosts/day. Identical boosts on hajper+snabbare+lyllo (100% match confirmed 2026-03-04)."

  hajper:
    type: comeon
    url: "https://www.hajper.com/sv/sportsbook/sport/85-odds-boost"
    primary_provider: hajper
    shared_with: []
    enabled: false
    note: "CONSOLIDATED: Same boosts as ComeOn (100% identical odds). Scraped via comeon shared_with."

  lyllo:
    type: comeon
    url: "https://www.lyllocasino.com/sv/sportsbook/sport/85-odds-boost"
    primary_provider: lyllo
    shared_with: []
    enabled: false
    note: "CONSOLIDATED: Same boosts as ComeOn (100% identical odds). Scraped via comeon shared_with. Confirmed active 2026-03-04."

