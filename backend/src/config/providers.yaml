# ============================================================================
# Provider definitions
# ============================================================================
# Only providers with bonuses are included. No-bonus providers (ATG, Paf,
# Svenska Spel, FrankFred) are excluded — they add extraction load without
# bankroll value.
#
# Validation status: PRODUCTION_READY = tested in full pipeline with metrics validated
providers:

  # --------------------------------------------------------------------------
  # Sharp source (reference odds — no bonus, kept for fair-odds baseline)
  # --------------------------------------------------------------------------

  pinnacle:
    id: pinnacle
    name: Pinnacle
    domain: pinnacle.se
    retriever_type: pinnacle
    api_base: https://guest.api.arcadia.pinnacle.com/0.1
    sharp: true
    concurrent_leagues: 10               # Throttled for ISP proxy — too many parallel requests get 403
    sport_timeout: 240                   # Football has ~200 leagues × 2 API calls each; needs headroom under load

  # --------------------------------------------------------------------------
  # Polymarket (prediction market — event matching only)
  # --------------------------------------------------------------------------

  polymarket:
    id: polymarket
    name: Polymarket
    retriever_type: polymarket
    base_url: https://gamma-api.polymarket.com
    clob_url: https://clob.polymarket.com
    currency: USDC
    exchange_rate_sek: 10.50
    params:
      game_bets_tag_id: 100639
      # Spread buffer (cents) added to price for slippage. 0 = no buffer.
      spread_buffer_cents: 0
      # Use CLOB order book for depth-adjusted VWAP pricing (true/false)
      use_clob_prices: true
      # Target fill size in USD — VWAP calculated by walking the ask side of the order book.
      # Thin markets where this walks up significantly will show worse (realistic) odds.
      fill_size_usd: 25
      # Minimum available depth (USD) on ask side. Markets below this are skipped.
      min_depth_usd: 10

