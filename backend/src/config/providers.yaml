# ============================================================================
# Extraction Scheduling (per-provider cadence)
# ============================================================================

extraction_scheduling:
  # Bare metal i7-7700 (4C/8T, 64GB RAM): all tiers run aggressively in parallel.
  # Old Hetzner CPX32 (4 shared vCPU, 8GB) forced sequential browser extraction and long intervals.
  # Dedicated hardware means: more concurrent browsers, shorter intervals, fresher odds.

  sharp:
    # Sharp reference (Pinnacle) — highest priority, freshest odds
    # Pinnacle finishes in 8-37s via direct gost. Run every 60s for near-realtime odds.
    # Polymarket split out — it takes 17-48s and would drag Pinnacle's refresh rate.
    providers: [pinnacle]
    interval_minutes: 1
    grouped: false

  polymarket:
    # Event matching only (not a sharp source). Doesn't need real-time refresh.
    # Bumped 5 → 10 (2026-04-28): Polymarket's active catalog grew to 2500+
    # events at ~15-30 MB/page; full pagination through proxy hits 10-28 min
    # wallclock and overruns a 5-min cadence. Combined with MAX_PAGES=5 cap
    # in polymarket.py, 10-min cadence gives clean room without re-queueing
    # while a slow run is in flight. Polymarket isn't sharp — extra 5 min
    # of staleness on event-matching is fine.
    providers: [polymarket]
    interval_minutes: 10
    grouped: false

  kalshi:
    # Prediction-market exchange. Public REST API, unauthenticated for market data.
    providers: [kalshi]
    interval_minutes: 5
    grouped: false

  api_soft:
    # Fast REST/WS/API-interception providers — all fire simultaneously.
    # Bumped 2 → 3 (2026-04-28): the global _analysis_lock is contention-bound
    # under load (sharp analyzer holds it 60-120s; deadlock retries push longer).
    # 2-min cadence forces api_soft pipelines to retry analyzer-acquire before
    # the previous run's analyzer has even finished, amplifying lock thrash.
    # 3 min gives breathing room and matches user priority — api_soft is
    # tier-2 below sharp + unlimited sources.
    providers:
      # Kambi — canonical only (represents 7 brands: unibet, leovegas, betmgm, speedybet, x3000, goldenbull, 1x2)
      - unibet
      # Altenar — canonical only (represents 6: betinia, campobet, lodur, quickcasino, swiper, dbet)
      - betinia
      # Gecko V2 / OBG — single canonical (spelklubben). Live API audit
      # 2026-04-27 confirmed all 5 OBG brands (betsson, betsafe, nordicbet,
      # bethard, spelklubben) serve the same backend with sub-percent odds
      # variance. Spelklubben's CDN-fronted endpoint is fastest + offers the
      # softer of the two margin tiers. Members fan-out via PLATFORM_GROUPS.
      - spelklubben
      # BetConstruct (1) — WebSocket API
      - vbet
    interval_minutes: 3
    grouped: false

  browser_soft:
    # Browser-based extractors — each browser = 1-2GB RAM. User-priority tier-3
    # (lowest); accept staler odds in exchange for not contending with the
    # higher-priority sharp/unlimited/api_soft tiers.
    max_concurrent_browsers: 2           # Reduced from 4 — memory constrained
    providers:
      - 888sport
      # 10bet moved to browser_slow tier 2026-04-28 — see below. Football is
      # fully dead (1200s timeout per attempt, 3-attempt ladder still fails).
      # Aggregate 4h yield: 0.03 ev/s, 1 run, 53 events. Burning a browser
      # slot every 30m for nothing. Demoted to its own slow tier.
      - tipwin
    interval_minutes: 45
    grouped: false

  browser_slow:
    # Demoted browser providers — extraction cost > yield. Run hourly so they
    # produce at least some data without competing with healthier extractors.
    # 10bet: site/proxy contention has it at 0.03 ev/s; sometimes catches a
    # handful of handball/mma events on a successful cycle.
    # coolbet: demoted 2026-04-28. Per-provider audit confirmed coolbet's
    # backend is returning 503 + NetworkError on the category API endpoints
    # consistently (not Imperva — Imperva bypass works fine, "Session
    # established — Imperva bypassed" logs). The 503s come from coolbet's
    # own /s/sbgate/sports/fo-category/ service. With 0/10 sports producing
    # events on every recent cycle, hourly is wasted enough.
    # If either site recovers, promote back to browser_soft / browser_antibot.
    max_concurrent_browsers: 1
    providers:
      - 10bet
      - coolbet
    interval_minutes: 60
    grouped: false

  browser_antibot:
    # Providers with aggressive anti-bot (Cloudflare, Imperva). Lowest priority
    # alongside browser_soft. coolbet was here but its backend is currently
    # returning 503s (not an Imperva block) — moved to browser_slow above.
    max_concurrent_browsers: 1           # Reduced from 2 — comeon alone takes 20min + 1.5GB
    providers:
      - comeon
      - rainbet
    # Bumped 15 → 25 (2026-04-28): camoufox launches are heavy and can stall
    # under proxy contention. Camoufox subprocess teardown takes 5-10s after
    # the run ends. 25-min cadence ensures full teardown + cooldown before
    # the next cycle launches a fresh fingerprint.
    interval_minutes: 25
    grouped: false

  cloudbet:
    # Playable, unlimited stake — pulled into its own tier so it cycles
    # at full 5-min cadence (matching polymarket/kalshi) instead of sharing
    # a slot with marathon/smarkets which can starve it under load.
    providers: [cloudbet]
    interval_minutes: 5
    grouped: false

  signal_international:
    # Signal-only providers — read odds for consensus, no bet placement.
    # Marathon: HTML scraping. Smarkets: betting exchange JSON API
    # (requires SOCKS5 proxy — geoblocked direct).
    # Stake.com removed — Cloudflare blocks datacenter IPs, needs residential proxy.
    # Cloudbet split out above (playable + unlimited, deserves own tier).
    providers:
      - marathon
      - smarkets
    interval_minutes: 5
    grouped: false

