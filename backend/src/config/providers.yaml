# ============================================================================
# Extraction Tiers
# ============================================================================

extraction_tiers:
  continuous:
    # Sharp reference (Pinnacle) + event matching (Polymarket)
    providers: [pinnacle, polymarket]
    interval_minutes: 5

  scheduled:
    # Easy REST API soft books
    providers: [betinia, campobet, swiper, lodur, dbet, quickcasino]
    interval_minutes: 240

  manual:
    # Rate-limited / browser-based providers — on-demand only
    providers:
      # Kambi API (8)
      - unibet
      - leovegas
      - expekt
      - betmgm
      - speedybet
      - x3000
      - goldenbull
      - 1x2
      # Spectate (2)
      - mrgreen
      - 888sport
      # Gecko V2 (4)
      - betsson
      - betsafe
      - nordicbet
      - spelklubben
      # SBTech (2)
      - bethard
      - 10bet
      # Snabbare (1)
      - snabbare
      # ComeOn Group (2)
      - comeon
      - hajper
      # BetConstruct (1)
      - vbet
      # Interwetten (1)
      - interwetten

