# Provider Configuration
# Uses YAML anchors to reduce duplication
# Bonus info source: https://speltips.se/ (check periodically for updates)
#
# Proxy: PROXY_URL env var (Bahnhof VPS, AS8473 Swedish ISP) is used by ALL providers:
#   - Pinnacle, Altenar (aiohttp via aiohttp-socks ProxyConnector)
#   - Kambi, Gecko V2, 10bet, Spectate (Playwright BrowserTransport)
#   - Coolbet, ComeOn (Camoufox anti-detect browser)
#   - VBet (WebSocket via PySocks SOCKS5)
#   - Tipwin uses RESIDENTIAL_PROXY_URL (dedicated tunnel to same Bahnhof VPS, port 1081)

# Global orchestrator configuration
# Tuned for bare metal i7-7700 (4C/8T), 64GB RAM, 2x 256GB SSD
# Memory budget: uvicorn ~10GB, RL ~4GB, Postgres ~8GB, OS ~2GB = 24GB base.
# Remaining ~40GB for browsers. Each browser = 1-2 GB (renderer + content procs).
# 4 browsers * 2GB = 8GB, total ~32GB peak — safe under 48GB Docker limit.
orchestrator:
  # Concurrency limits
  max_concurrent_providers: 8          # Reduced from 16 — 8 threads, no point oversaturating
  max_concurrent_sports_per_provider: 3 # Reduced from 4 — less parallel memory pressure
  max_browser_instances: 5

  # Provider groups for type-aware scheduling
  # Groups providers by shared backend/resource to prevent rate limits and contention
  provider_groups:
    - name: kambi_api
      retriever_types: [kambi]
      max_concurrent: 2                # Bare metal: can handle 2 Kambi concurrent (rate limits are per-IP, not per-thread)
      shared_resource: api
      health_check_delay_ms: 300       # 0.3s between Kambi health checks
      post_extraction_delay_ms: 2000   # 2s delay between providers (faster recovery)

    - name: gecko_browser
      retriever_types: [gecko_v2]
      max_concurrent: 1                # Reduced from 2 — concurrent gecko brands fight for
                                       # Bahnhof proxy bandwidth (Swedish-IP-only sites),
                                       # causing session-init timeouts. Serial run lets each
                                       # brand finish in ~10s; saves wallclock vs 3+ failed
                                       # 180s attempts when contended.
      shared_resource: browser

    - name: spectate_browser
      retriever_types: [spectate]
      max_concurrent: 2                # Reduced from 3 — each spectate browser = 1-2GB
      shared_resource: browser

    - name: comeon_group
      retriever_types: [custom]
      max_concurrent: 2                # ComeOn internal parallelism already heavy — keep at 2
      shared_resource: browser

    - name: rest_api
      retriever_types: [pinnacle, altenar, betconstruct]
      max_concurrent: 8                # All REST APIs fire simultaneously
      shared_resource: none

    - name: sbtech_browser
      retriever_types: [snabbare, tenbet]
      max_concurrent: 2                # Browser-based
      shared_resource: browser

    - name: coolbet_browser
      retriever_types: [coolbet]
      max_concurrent: 2                # Bare metal: Imperva still sensitive but can do 2
      shared_resource: browser

    - name: tipwin_browser
      retriever_types: [tipwin]
      max_concurrent: 2                # Bare metal: 2 concurrent tipwin
      shared_resource: browser

    - name: signal_api
      retriever_types: [stake, cloudbet, marathon]
      max_concurrent: 3                # All lightweight REST/HTML APIs
      shared_resource: none

  # Timeouts — no provider_timeout, direct gost has no connection limit
  sport_timeout: 1800                  # 30 min safety net — let sports run to completion

  # Performance
  batch_commit_size: 100               # Events per DB commit

  # Enhancement configurations (all optional, defaults shown)
  retry:
    enabled: true
    max_retries: 3                     # Bare metal: can afford retries with dedicated CPU
    initial_backoff_seconds: 1.0       # Faster backoff start
    max_backoff_seconds: 15.0          # Shorter max wait — machine recovers fast
    exponential_base: 2.0
    retry_on_timeout: true             # Bare metal: retries are cheap, timeouts are likely transient network issues

  circuit_breaker:
    enabled: true
    failure_threshold: 5
    recovery_timeout_seconds: 300
    half_open_max_attempts: 3

  cache:
    enabled: true
    ttl_seconds: 300
    max_entries: 5000                    # Scaled for 64GB RAM (was 1000)
    cache_layer: transport
    cache_per_provider: true

  health_check:
    enabled: true
    strategy: on_demand
    timeout_seconds: 120.0             # Was 60s — kalshi's limit=1 probe pulls every Kalshi market via residential proxy and grazes 60s under contention. 120s gives slow API providers headroom without meaningfully slowing failure detection (cache TTL is 60s anyway).
    check_before_extraction: true

  metrics:
    enabled: true
    track_timing: true
    track_success_rate: true
    track_cache_hit_rate: true
    persist_to_db: true
    retention_count: 100

  progress:
    enabled: true
    transport: callback
    websocket_path: /ws/extraction

  graceful_shutdown:
    enabled: true
    shutdown_timeout_seconds: 30
    cancel_pending_tasks: true

  fuzzy_match:
    threshold: 85                    # Minimum average match score (0-100)
    min_individual_score: 75         # Minimum score for EACH team (was 80, relaxed for browser providers)
    max_asymmetry_diff: 25           # Max difference between team scores (was 20)
    min_for_asymmetry_check: 80      # Only reject asymmetry if min score below this (was 85)
    prefix_filter_length: 3          # Chars for prefix pre-filtering (0 to disable)

  rate_limit:
    max_retries: 2                   # Max retries on 429 rate limit
    default_wait_seconds: 5          # Default wait if no Retry-After header
    max_wait_seconds: 60             # Cap on exponential backoff
    notify_circuit_breaker_after: 2  # Notify circuit breaker after N consecutive 429s

