      type: bonusdeposit
      amount: 1000
      wagering_multiplier: 14      # (dep+bonus)×7 = bonus×14 when dep=bonus. Max 1000kr/slip.
      min_odds: 1.80
      trigger_mode: cumulative

# ============================================================================
# Extraction Scheduling (per-provider cadence)
# ============================================================================

extraction_scheduling:
  # Bare metal i7-7700 (4C/8T, 64GB RAM): all tiers run aggressively in parallel.
  # Old Hetzner CPX32 (4 shared vCPU, 8GB) forced sequential browser extraction and long intervals.
  # Dedicated hardware means: more concurrent browsers, shorter intervals, fresher odds.

  sharp:
    # Sharp reference (Pinnacle) — highest priority, freshest odds
    # Pinnacle finishes in 8-37s via direct gost. Run every 60s for near-realtime odds.
    # Polymarket split out — it takes 17-48s and would drag Pinnacle's refresh rate.
    providers: [pinnacle]
    interval_minutes: 1
    grouped: false

  polymarket:
    # Event matching only (not a sharp source). Doesn't need real-time refresh.
    providers: [polymarket]
    interval_minutes: 5
    grouped: false

  api_soft:
    # Fast REST/WS/API-interception providers — all fire simultaneously
    # Direct gost: no tunnel bottleneck, tighten to 3 minutes
    providers:
      # Kambi — canonical only (represents 7 brands: unibet, leovegas, betmgm, speedybet, x3000, goldenbull, 1x2)
      - unibet
      # Altenar — canonical only (represents 6: betinia, campobet, lodur, quickcasino, swiper, dbet)
      - betinia
      # Gecko V2 — canonical only (represents 5: betsson, nordicbet, bethard, spelklubben, betsafe)
      - betsson
      # BetConstruct (1) — WebSocket API
      - vbet
    interval_minutes: 2
    grouped: false

  browser_soft:
    # Browser-based extractors — direct gost, 65% CPU idle
    max_concurrent_browsers: 4
    providers:
      - 888sport
      - interwetten
      - 10bet
      - tipwin
    interval_minutes: 8
    grouped: false

  browser_antibot:
    # Providers with aggressive anti-bot (Cloudflare, Imperva)
    max_concurrent_browsers: 2
    providers:
      - coolbet
      - comeon
    interval_minutes: 10
    grouped: false

