# ============================================================================
# Extraction Tiers
# ============================================================================

extraction_tiers:
  sharp:
    # Sharp reference (Pinnacle) + event matching (Polymarket)
    # Runs on startup, then every 3 minutes
    providers: [pinnacle, polymarket]
    interval_minutes: 3

  api_soft:
    # Fast REST/WS/API-interception providers — every 60 minutes
    # Platform consolidation: only canonical providers extracted (others get fanned-out opportunities)
    # Runs on startup, then every 60 minutes
    providers:
      # Kambi — canonical only (represents 7 brands: unibet, leovegas, betmgm, speedybet, x3000, goldenbull, 1x2)
      - unibet
      # Altenar — main group canonical (represents 5: betinia, campobet, lodur, quickcasino, swiper)
      - betinia
      # Altenar — dbet extracted separately (~4% different odds)
      - dbet
      # Gecko V2 — 2 sub-group canonicals (betsson+nordicbet, bethard+spelklubben)
      - betsson
      - bethard
      # BetConstruct (1) — WebSocket API
      - vbet
    interval_minutes: 60

  browser_soft:
    # Heavy browser-based extractors — every 60 minutes
    # Runs on startup, then every 60 minutes
    providers:
      # Spectate — canonical only (represents 2: 888sport, mrgreen)
      - 888sport
      # ComeOn Group — keep all 3 (too different: 1.7-83% identity)
      - comeon
      - hajper
      - lyllo
      # Snabbare (1)
      - snabbare
      # 10Bet (1)
      - 10bet
      # Interwetten (1)
      - interwetten
      # Coolbet (1) - Camoufox anti-detect Firefox bypasses Imperva
      - coolbet
      # Tipwin (1)
      - tipwin
    interval_minutes: 60

