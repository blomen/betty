# ═══════════════════════════════════════════════════════════════
# Navigation Paths — Bet placement automation per provider
# ═══════════════════════════════════════════════════════════════
# Discovered by manually walking each site with Playwright.
# This is the single source of truth for automating bet placement.
#
# SESSION LIFECYCLE (applies to all providers):
#   1. Launch CDP Chrome (--remote-debugging-port=9222) with user profile
#   2. Connect Playwright via connect_over_cdp("http://localhost:9222")
#   3. Navigate to site → dismiss cookie banner if present
#   4. Check login state → if not logged in, trigger login flow
#   5. Execute action (place bet, check balance, etc.)
#   6. End goal: once flows are validated, run headless with stored cookies
#
# Altenar URL routing:
#   Base: /{lang}/sport?sportRoutingParams=...
#   Separator: ~ (key~value), __ (pair separator)
#   Page types: home, championship (league listing), event (single match)
#
# IMPORTANT: Altenar widget renders inside <stb-sportsbook> custom element
# with closed shadow DOM. Standard CSS selectors DO NOT work on inner elements.
# All interaction must use coordinate-based mouse clicks via Playwright.
# ═══════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────
# ALTENAR GROUP
# All Altenar skins share identical widget structure.
# Only base_url, integration, and language prefix differ.
# Once one skin is mapped, all others follow the same pattern.
# Skins: betinia, campobet, lodur, quickcasino, swiper, dbet
# ─────────────────────────────────────────────────────────────

altenar_defaults: &altenar_defaults
  platform: altenar

  widget:
    element: "stb-sportsbook#STB_SPORTSBOOK"
    inner_dom: "closed shadow — no CSS selectors on inner elements"
    interaction_method: "coordinate-based mouse clicks"
    # The widget renders a full SPA inside the custom element.
    # Page content is driven by the sportRoutingParams query string.
    # URL changes trigger widget re-render (no full page reload).

  # ─── URL PATTERNS ───────────────────────────────────────────
  # All IDs are Altenar-internal. Must map from our DB event to Altenar IDs.
  # The Altenar API (used during extraction) returns these IDs — store them.
  urls:
    sportsbook: "/{lang}/sport"
    league: "/{lang}/sport?sportRoutingParams=page~championship__categoryIds~{categoryId}__championshipIds~{championshipId}"
    event: "/{lang}/sport?sportRoutingParams=page~event__sportId~{sportId}__categoryIds~{categoryId}__championshipIds~{championshipId}__eventId~{eventId}"
    # Account pages exist but are NOT automated — deposit/withdraw/transfer/bets are always manual.
    # Just open the landing page and let the user navigate from there.

  # ─── LOGIN ─────────────────────────────────────────────────
  login:
    trigger: "Click 'SPELA HÄR' button (top-right header) or navigate to any /account/* page"
    modal:
      title: "LOGGA IN FÖR ATT SPELA"
      description: "Använd BankID-appen för att få åtkomst till ditt konto."
      qr_code: "Displayed for scanning with BankID mobile app"
      divider: "eller"
      desktop_button: "ÖPPNA BANKID"
      close_button: "X (top-right of modal)"
    flow: |
      Option A — QR code (mobile BankID):
        1. Modal appears with QR code
        2. User scans QR with BankID app on phone
        3. User authenticates in BankID app
        4. Page auto-redirects to logged-in state
      Option B — Desktop BankID:
        1. Click "ÖPPNA BANKID" green button
        2. BankID desktop app opens automatically
        3. User authenticates in BankID app
        4. Page auto-redirects to logged-in state
    check_logged_in: |
      - Header changes: "SPELA HÄR" button replaced by balance display + account icon
      - On sportsbook: kupong shows "PLACERA SPEL" instead of "VÄNLIGEN LOGGA IN..."
      - /account pages load content instead of showing login modal
    note: "BankID login is session-based. Cookies persist across browser restarts in CDP Chrome."

  # ─── COOKIE BANNER ──────────────────────────────────────────
  cookie_banner:
    appears: "bottom of page on first visit (per browser session)"
    decline_button: "Endast nödvändiga"
    accept_button: "Acceptera alla"
    action: "click 'Endast nödvändiga' (privacy-preserving)"
    test_id: "btnAcceptNecessaryCookies"

  # ─── SEARCH (alternative to direct URL navigation) ──────────
  search:
    location: "left sidebar, below league list"
    placeholder: "FYLL I LAG- ELLER MÄSTERSKAPSNAMN"
    flow:
      - "Click search input in left sidebar"
      - "Type team/league name"
      - "Wait ~2s for results to appear below search box"
      - "Results show: date/time, league flag, home team, away team"
      - "Click matching result → URL updates with sportRoutingParams → event page loads"
    clear: "Click X button right of search input to clear"
    note: "Search is instant (no page reload). Results scroll independently in sidebar."

  # ─── EVENT PAGE LAYOUT ──────────────────────────────────────
  event_page:
    breadcrumb: "< SPORT > COUNTRY > LEAGUE > HOME VS. AWAY"
    header: "home team name (left) — away team name (right) with jersey icons"
    sub_header: "league name | matchday N | date time"
    tabs: [Alla, Huvud, "Bet Builder", Insights, "Boosted Odds", "Teams H2H", Extra, "1:a Halvlek", "2:a Halvlek", Hörnor, Kombination]
    markets:
      1x2:
        label: "1X2"
        layout: "3 buttons in a row: [HOME name + odds] [X + odds] [AWAY name + odds]"
        position: "first market section below tabs"
        outcomes:
          home: "left button"
          draw: "center button"
          away: "right button"
      totals:
        label: "TOTALT ANTAL MÅL"
        layout: "2 buttons: [ÖVER {line} + odds] [UNDER {line} + odds] + slider for line"
        position: "below 1x2"
        has_line_slider: true
      spread:
        label: "HANDIKAPP"
        layout: "buttons per handicap line"
        position: "varies (may need scrolling)"
      other_visible:
        - "VILKET LAG VINNER FINALEN (cup winner)"
        - "FÖRSTA MÅLET (first goal scorer)"
        - "DUBBELCHANS (double chance)"
        - "BÅDA LAGEN GÖR MÅL (both teams to score)"

  # ─── BETSLIP (KUPONG) ──────────────────────────────────────
  betslip:
    trigger: "click any odds button on event page"
    appears: "slides in from right side, overlays ~40% of page width"
    header: "KUPONG {count}"
    tabs:
      singel: "Single bet (default for 1 selection)"
      multipel: "Combo/accumulator (auto-selected when 2+ selections)"
      system: "System bet"

    selection_card:
      fields:
        - "event name (e.g. FORTALEZA VS. CEARA)"
        - "market type (e.g. 1X2)"
        - "outcome name (e.g. X)"
        - "odds (e.g. 2.90)"
      remove_button: "X icon, top-right of card"
      live_indicator: "LIVE badge if match is in-play"
      locked_message: "DINA VAL ÄR INTE TILLGÄNGLIGA FÖR NÄRVARANDE"

    stake_input:
      default_value: "10"
      position: "below selection card, left side"
      set_method: "triple-click to select all → type new amount"
      vinst_display: "VINST: {stake * odds} — shown right of stake input"

    actions:
      clear_all:
        label: "RENSA ALLT"
        icon: "trash"
      place_bet:
        label_logged_in: "PLACERA SPEL"
        label_logged_out: "VÄNLIGEN LOGGA IN FÖR ATT PLACERA SPEL"
        color: "green"
        position: "bottom of kupong panel"

    totals:
      insats: "TOTAL INSATS: {total_stake}"
      vinst: "TOTAL VINST: {total_potential_win}"
      combo_odds: "TOTALT ODDS: {combined_odds}"  # only in multipel mode

    combo_promo: "LÄGG TILL 1 MATCH MED ODDS PÅ 1.20 ELLER HÖGRE FÖR ATT ÖKA DIN VINST MED 3%"

  # ─── FULL BET PLACEMENT FLOW ────────────────────────────────
  # Exact Playwright automation sequence.
  place_bet_flow:
    pre_conditions:
      - "CDP Chrome running with logged-in session"
      - "Cookie banner already dismissed (or handle in step 0)"
      - "Altenar event IDs available (from extraction DB or search fallback)"

    steps:
      - step: 0
        action: session_init
        detail: |
          Connect to CDP Chrome. Navigate to sportsbook.
          If cookie banner visible: click "Endast nödvändiga" (test-id: btnAcceptNecessaryCookies)
          If not logged in: trigger BankID login and wait for auth.
        once_per_session: true

      - step: 1
        action: navigate_to_event
        detail: |
          page.goto("{base_url}/{lang}/sport?sportRoutingParams=page~event__sportId~{sportId}__categoryIds~{categoryId}__championshipIds~{championshipId}__eventId~{eventId}")
        wait: "3s for Altenar widget to render"
        verify: "URL contains correct eventId"
        fallback: |
          If Altenar IDs not available:
            1. Navigate to sportsbook
            2. Click search box, type home team name
            3. Wait 2s, find result matching date + away team
            4. Click result → extract IDs from URL

      - step: 2
        action: clear_existing_betslip
        detail: |
          Check if KUPONG panel is visible with existing selections.
          If yes: click "RENSA ALLT" button.
        wait: "500ms"
        skip_if: "kupong empty or not visible"

      - step: 3
        action: click_odds_button
        detail: |
          Locate the correct market section on event page.
          For 1x2: find the row labeled "1X2", click home/draw/away button.
          For totals: find "TOTALT ANTAL MÅL", click over/under button.
          For spread: find "HANDIKAPP", click the matching line button.
          Button highlights teal/green when selected.
        wait: "1s for kupong to appear/update"
        verify: |
          Kupong shows:
            - Correct event name
            - Correct market (1X2 / totals / spread)
            - Correct outcome
            - Odds match expected value (±0.05 tolerance for movement)

      - step: 4
        action: set_stake
        detail: |
          In kupong panel, find the stake input field.
          Triple-click to select current value (default "10").
          Type the desired stake amount as digits.
          VINST recalculates automatically.
        wait: "500ms"
        verify: "TOTAL INSATS matches desired stake"

      - step: 5
        action: confirm_and_place
        detail: |
          Verify final state before clicking:
            - Correct event + outcome in kupong
            - Odds still match (may have changed)
            - Stake and potential VINST correct
          Click "PLACERA SPEL" green button.
        wait: "2-3s for server response"
        verify: "Bet confirmation message appears"
        requires: "logged_in"
        error_handling: |
          - "DINA VAL ÄR INTE TILLGÄNGLIGA" → event went live or odds suspended, abort
          - Odds changed → re-evaluate edge, abort if below threshold
          - Insufficient balance → log error, skip this bet

  # ─── MANUAL OPERATIONS ──────────────────────────────────────
  # Deposit, withdraw, transfer, balance check, bet history, bonuses
  # are NOT automated. These functions just open the provider's landing
  # page — the user navigates to the correct section from there.

  # ─── QUIRKS & EDGE CASES ────────────────────────────────────
  quirks:
    - "Betslip persists across page navigation — old selections stay until cleared"
    - "Live events show padlock + 'DINA VAL ÄR INTE TILLGÄNGLIGA FÖR NÄRVARANDE'"
    - "Adding 2nd selection auto-switches kupong to MULTIPEL tab"
    - "Odds buttons show team/outcome name + decimal odds in same button"
    - "Widget re-renders on URL change (SPA behavior, no full page reload)"
    - "Search results in sidebar scroll independently from main content"
    - "Closing login modal on /account/* pages redirects to /sv/404"
    - "All /account/* pages require login — no partial content shown"
    - "Burger menu (hamburger icon, top-left) shows site navigation (not account links when logged out)"

