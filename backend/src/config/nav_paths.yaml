# ═══════════════════════════════════════════════════════════════
# ALTENAR ID MAPPING
# ═══════════════════════════════════════════════════════════════
# During extraction, the Altenar API returns these IDs per event:
#   - sportId    (66=football, 67=ice_hockey, 68=basketball, etc.)
#   - categoryId (country: 503=France, 593=Brazil, etc.)
#   - championshipId (league: 2943=Ligue 1, 3130=Cearense Serie A, etc.)
#   - eventId    (match: 15702902=Fortaleza vs Ceara)
#
# REQUIREMENT: Store these 4 IDs in our events table during extraction
# so we can construct the event URL at placement time without searching.
#
# If IDs are not stored, fallback to search:
#   1. Navigate to sportsbook
#   2. Type home team name in search box
#   3. Find matching result by date + away team
#   4. Click to navigate → extract eventId from URL
#
# Discovered ID examples:
#   Football (sportId=66):
#     France (categoryId=503): Ligue 1 (championshipId=2943)
#     Brazil (categoryId=593): Cearense Serie A (championshipId=3130)
# ═══════════════════════════════════════════════════════════════
