# Trading Configuration
# Config-driven instruments, setups, and daily routine items.
# Add new instruments/setups/checklist items here — no code changes needed.

instruments:
  NQ:
    name: "Nasdaq 100 E-mini"
    tick_size: 0.25
    tick_value: 5.0
    contract_size: 20.0
    margin: 18700
    commission_per_contract: 4.18
    default_account: intraday
  MNQ:
    name: "Micro Nasdaq 100"
    tick_size: 0.25
    tick_value: 0.50
    contract_size: 2.0
    margin: 1870
    commission_per_contract: 1.62
    default_account: intraday
  ES:
    name: "S&P 500 E-mini"
    tick_size: 0.25
    tick_value: 12.50
    contract_size: 50.0
    margin: 15400
    commission_per_contract: 4.18
    default_account: swing

setups:
  # ---- Fabio Valentini setups ----
  trend_continuation:
    name: "Trend Continuation"
    category: fabio
    description: "Enter in direction of established trend after pullback to value area"
    confirmations:
      - "Clear trend direction on higher TF"
      - "Pullback to VWAP or value area"
      - "Delta confirmation on entry TF"
      - "Volume increase on continuation"

  reversal_vwap_2sd:
    name: "Reversal VWAP 2SD"
    category: fabio
    description: "Mean reversion from VWAP 2nd standard deviation band"
    confirmations:
      - "Price at VWAP 2SD band"
      - "Absorption / exhaustion on delta"
      - "Divergence on cumulative delta"
      - "No major news catalyst"

  reversal_vwap_3sd:
    name: "Reversal VWAP 3SD"
    category: fabio
    description: "High-probability mean reversion from VWAP 3rd standard deviation"
    confirmations:
      - "Price at VWAP 3SD band"
      - "Clear exhaustion candle"
      - "Volume climax"
      - "Delta divergence confirmed"

  trapped_traders:
    name: "Trapped Traders"
    category: fabio
    description: "Fade trapped longs/shorts after failed breakout"
    confirmations:
      - "Clear breakout attempt that fails"
      - "Volume spike on breakout (trapped participants)"
      - "Quick reversal back into range"
      - "Delta shift confirming trapped side"

  break_of_structure:
    name: "Break of Structure"
    category: fabio
    description: "Trade break of key structural level with momentum"
    confirmations:
      - "Key level identified (HH/HL or LH/LL)"
      - "Clean break with body close beyond level"
      - "Volume supports the break"
      - "No immediate resistance/support ahead"

  initial_balance_break:
    name: "Initial Balance Break"
    category: fabio
    description: "Trade expansion beyond the initial balance range"
    confirmations:
      - "IB range established (first 60 min)"
      - "Clean break of IB high/low"
      - "Volume expansion on break"
      - "Bias aligns with break direction"

  # ---- Flow Horse setups ----
  eighty_percent_rule:
    name: "80% Rule"
    category: flow_horse
    description: "When market opens within previous value area, expect rotation to other side"
    confirmations:
      - "Open within previous day value area"
      - "Initial move toward one VA extreme"
      - "80% of previous VA covered"
      - "Delta confirms rotation direction"

  break_from_balance:
    name: "Break from Balance"
    category: flow_horse
    description: "Trade directional move out of balanced/bracketing market"
    confirmations:
      - "Multi-day balance area identified"
      - "Clean break of balance boundary"
      - "Increased volume on break"
      - "Market profile shows single prints"

  swing_failure_trap:
    name: "Swing Failure Trap"
    category: flow_horse
    description: "Fade failed swing above/below key level (poor high/low)"
    confirmations:
      - "Swing above/below key level"
      - "Failure to hold (poor high/low)"
      - "Quick reversal back through level"
      - "Aggressive counter-delta"

  delta_unwind:
    name: "Delta Unwind"
    category: flow_horse
    description: "Trade the unwind of aggressive delta positioning"
    confirmations:
      - "Aggressive delta buildup identified"
      - "Price stalls despite delta push"
      - "Delta divergence forming"
      - "Unwind candle confirmation"

  double_distribution_reversal:
    name: "Double Distribution Reversal"
    category: flow_horse
    description: "Reversal at extreme of double distribution day"
    confirmations:
      - "Double distribution profile forming"
      - "Price at extreme of second distribution"
      - "Exhaustion signals present"
      - "Volume declining at extreme"

  ib_continuation:
    name: "IB Continuation"
    category: flow_horse
    description: "Continuation trade after initial balance break with acceptance"
    confirmations:
      - "IB break with strong conviction"
      - "Acceptance above/below IB (time + volume)"
      - "No excess / poor auction at IB edge"
      - "TPO structure confirms direction"

  acceptance_failure:
    name: "Acceptance Failure"
    category: flow_horse
    description: "Fade failed acceptance above/below key level"
    confirmations:
      - "Break of key level"
      - "Failure to build value beyond level"
      - "Responsive activity back through level"
      - "POC migrating away from break"

daily_routine:
  macro_items:
    - "Economic calendar checked (high-impact events)"
    - "DXY / Dollar index direction"
    - "VIX level and direction"
    - "Bond yields (10Y, 2Y) movement"
    - "Overnight positioning / sentiment"

  session_items:
    - "Overnight range marked (Globex high/low)"
    - "Expected IB range calculated"
    - "Key levels marked (POC, VAH, VAL, pivots)"
    - "Previous day VA mapped"
    - "Opening type identified"

  psych_threshold: 5.0

# ============ Market Data ============
market_data:
  provider: databento
  api_key_env: DATABENTO_API_KEY
  symbol: NQ.v.0  # continuous front-month (volume roll — matches TradingView NQ1!)
  dataset: GLBX.MDP3
  sessions:
    rth_open: "09:30"
    rth_close: "16:00"
    globex_open: "18:00"
    ib_duration_minutes: 60
  cache_dir: market_cache

# ============ Scanner ============
scanner:
  score_threshold: 70
  scan_interval_minutes: 5
  signal_expiry_minutes: 60
