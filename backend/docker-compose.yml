name: betty

services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/init-market-db.sql:/docker-entrypoint-initdb.d/01-market-db.sql
    environment:
      - POSTGRES_USER=betty
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=betty
    # Tuned for bare metal with 64GB RAM — PostgreSQL gets ~12GB dedicated
    command:
      - postgres
      - -c
      - shared_buffers=4GB
      - -c
      - effective_cache_size=10GB
      - -c
      - work_mem=256MB
      - -c
      - maintenance_work_mem=1GB
      - -c
      - wal_buffers=64MB
      - -c
      - max_connections=200
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=2GB
    # Memory cap: prevents Postgres from contributing to OOM.
    # shared_buffers=4GB + work_mem=256MB * connections + OS cache.
    mem_limit: 12g
    memswap_limit: 13g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betty"]
      interval: 5s
      retries: 5
    restart: unless-stopped
    # No public port — only reachable by backend via Docker network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        - VITE_BETTY_API_KEY=${BETTY_API_KEY}
    # Localhost-only for SSH tunnel — not public (nginx handles external traffic)
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - betty_data:/app/data
      - betty_logs:/app/logs
      - betty_models:/app/models
      - chrome_profile:/app/chrome-profile
    env_file:
      - ../.env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - BETTY_DATA_DIR=/app/data
      - BETTY_LOGS_DIR=/app/logs
      - DATABASE_URL=postgresql+asyncpg://betty:${DB_PASSWORD}@postgres:5432/betty
      - MARKET_DATABASE_URL=postgresql+asyncpg://betty:${DB_PASSWORD}@postgres:5432/market
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Inject tini as PID 1 to reap zombie chrome processes left behind when
    # BrowserTransport.close() force-kills hung renderers. Without this, the
    # Python entrypoint never calls wait() on orphans and they sit as defunct
    # entries in `ps` (no memory cost, but cosmetically alarming and could
    # hit PID limits over weeks).
    init: true
    # Memory cap: prevents OOM-killing the entire server.
    # Budget: 64GB total - 2GB OS - 8GB Postgres = 54GB for backend.
    # Cap at 48GB to leave headroom. Docker kills the container (not the kernel)
    # if exceeded, and restart: unless-stopped brings it back.
    mem_limit: 48g
    memswap_limit: 50g
    # OOM priority: kill backend container before system processes
    oom_score_adj: 500
    # Playwright browsers need time to close cleanly on SIGTERM.
    # Default 10s causes force-kill every time. 30s lets graceful shutdown work.
    stop_grace_period: 30s
    healthcheck:
      # 2026-05-07 triage: probe /health/live (a trivial async endpoint that
      # only returns {"status":"alive", uptime}) instead of /health (which
      # also reads market_data_poller.get_status). Both run on the same
      # asyncio event loop, but /health/live is the smallest possible
      # request — if THIS times out, the loop is genuinely starved (item
      # #37 in the architecture audit: tick-path runs DQN inference + DB
      # writes synchronously on the SignalR receive coroutine). Until
      # that root cause is fixed, switching to /health/live + a 30s
      # timeout reduces watchdog false-positives that were auto-restarting
      # the container on every minor stall during RTH.
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - certs:/etc/letsencrypt:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  pg_data:
  betty_data:
  betty_logs:
  betty_models:
  chrome_profile:
  certs:
