services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/init-market-db.sql:/docker-entrypoint-initdb.d/01-market-db.sql
    environment:
      - POSTGRES_USER=firev
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=firev
    # Tuned for bare metal with 64GB RAM — PostgreSQL gets ~12GB dedicated
    command:
      - postgres
      - -c
      - shared_buffers=4GB
      - -c
      - effective_cache_size=10GB
      - -c
      - work_mem=256MB
      - -c
      - maintenance_work_mem=1GB
      - -c
      - wal_buffers=64MB
      - -c
      - max_connections=200
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=2GB
    # Memory cap: prevents Postgres from contributing to OOM.
    # shared_buffers=4GB + work_mem=256MB * connections + OS cache.
    mem_limit: 12g
    memswap_limit: 13g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firev"]
      interval: 5s
      retries: 5
    restart: unless-stopped
    # No public port — only reachable by backend via Docker network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  backend:
    build:
      context: .
      args:
        - VITE_FIREV_API_KEY=${FIREV_API_KEY}
    # Localhost-only for SSH tunnel — not public (nginx handles external traffic)
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - firev_data:/app/data
      - firev_logs:/app/logs
      - firev_models:/app/models
      - chrome_profile:/app/chrome-profile
    env_file:
      - .env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - FIREV_DATA_DIR=/app/data
      - FIREV_LOGS_DIR=/app/logs
      - DATABASE_URL=postgresql+asyncpg://firev:${DB_PASSWORD}@postgres:5432/firev
      - MARKET_DATABASE_URL=postgresql+asyncpg://firev:${DB_PASSWORD}@postgres:5432/market
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Memory cap: prevents OOM-killing the entire server.
    # Budget: 64GB total - 2GB OS - 8GB Postgres = 54GB for backend.
    # Cap at 48GB to leave headroom. Docker kills the container (not the kernel)
    # if exceeded, and restart: unless-stopped brings it back.
    mem_limit: 48g
    memswap_limit: 50g
    # OOM priority: kill backend container before system processes
    oom_score_adj: 500
    # Playwright browsers need time to close cleanly on SIGTERM.
    # Default 10s causes force-kill every time. 30s lets graceful shutdown work.
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - certs:/etc/letsencrypt:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  pg_data:
  firev_data:
  firev_logs:
  firev_models:
  chrome_profile:
  certs:
