name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arnold
          POSTGRES_PASSWORD: test
          POSTGRES_DB: arnold
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arnold"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://arnold:test@localhost:5432/arnold
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install ruff

      - name: Ruff lint
        working-directory: backend
        run: |
          ruff check src/
          ruff format --check src/

      - name: Run tests
        working-directory: backend
        run: |
          pytest tests/ -q \
            --ignore-glob='tests/test_rl_*' \
            --ignore-glob='tests/test_dqn_*' \
            --ignore-glob='tests/test_live_inference*' \
            --ignore-glob='tests/test_amt_*' \
            --ignore-glob='tests/test_exchange_stats_*' \
            --ignore-glob='tests/test_fetch_statistics*' \
            --ignore-glob='tests/test_swing_*' \
            --ignore-glob='tests/test_market_structure*' \
            --ignore-glob='tests/test_betting_models*' \
            --ignore-glob='tests/test_level_classifier*' \
            --ignore-glob='tests/test_model_serving*' \
            --ignore-glob='tests/test_trading_ml*' \
            --ignore-glob='tests/test_optimizer*' \
            --ignore-glob='tests/test_m10_optimizer*' \
            --ignore-glob='tests/test_bet_interceptor*' \
            --ignore-glob='tests/test_mirror_*' \
            --ignore-glob='tests/test_mute_notifications*' \
            --ignore-glob='tests/test_polymarket_true*' \
            --ignore=tests/providers/test_comeon_dom_parser.py \
            -x

  arnold-frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: arnold/frontend/package-lock.json

      - name: Install dependencies
        working-directory: arnold/frontend
        run: npm ci

      - name: TypeScript check
        working-directory: arnold/frontend
        run: npx tsc --noEmit
