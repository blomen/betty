name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: firev
          POSTGRES_PASSWORD: test
          POSTGRES_DB: firev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U firev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://firev:test@localhost:5432/firev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: backend
        run: |
          pytest tests/ -q \
            --ignore-glob='tests/test_rl_*' \
            --ignore-glob='tests/test_dqn_*' \
            --ignore-glob='tests/test_live_inference*' \
            --ignore-glob='tests/test_amt_*' \
            --ignore-glob='tests/test_exchange_stats_*' \
            --ignore-glob='tests/test_fetch_statistics*' \
            --ignore-glob='tests/test_swing_*' \
            --ignore-glob='tests/test_market_structure*' \
            --ignore=tests/providers/test_comeon_dom_parser.py \
            --tb=line

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit
